<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#141a30">
<meta name="robots" content="noindex,nofollow">
<title>Quorum Record — How to Use</title>
<style>
  :root{
    --ink:#1c2541; --ink2:#141a30; --gold:#d4af37; --gold2:#b0893a;
    --paper:#f3eedf; --muted:#9aa3c4; --line:rgba(212,175,55,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--ink2);color:var(--paper);overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  .serif{font-family:Georgia,"Times New Roman",serif}

  #deck{position:fixed;inset:0;display:flex;flex-direction:column}
  .slides{flex:1;position:relative;overflow:hidden}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
    padding:calc(env(safe-area-inset-top) + 34px) 26px calc(env(safe-area-inset-bottom) + 96px);
    overflow-y:auto;opacity:0;transform:translateX(40px);transition:opacity .35s ease,transform .35s ease;
    pointer-events:none;background:radial-gradient(130% 100% at 50% 0%,#26305a 0%,var(--ink) 50%,var(--ink2) 100%)}
  .slide.active{opacity:1;transform:translateX(0);pointer-events:auto}
  .slide.prev{transform:translateX(-40px)}

  .step{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
  .slide h1{font-size:clamp(26px,8vw,40px);font-weight:600;line-height:1.12;margin-bottom:14px}
  .slide h2{font-size:clamp(22px,6.5vw,32px);font-weight:600;line-height:1.15;margin-bottom:16px}
  .slide p{font-size:clamp(15px,4.4vw,18px);color:#dfe3f2;line-height:1.55;max-width:640px}
  .slide p+p{margin-top:12px}
  ul.pts{list-style:none;max-width:640px;margin-top:6px}
  ul.pts li{font-size:clamp(15px,4.3vw,17.5px);color:#e7eaf6;line-height:1.5;padding:10px 0 10px 30px;
    position:relative;border-bottom:1px solid rgba(255,255,255,.07)}
  ul.pts li:last-child{border-bottom:none}
  ul.pts li::before{content:"";position:absolute;left:4px;top:17px;width:9px;height:9px;border-radius:50%;
    background:var(--gold)}
  ul.pts li b{color:#fff}
  .tag{display:inline-block;background:rgba(212,175,55,.16);color:var(--gold);border:1px solid var(--line);
    padding:5px 11px;border-radius:20px;font-size:12.5px;font-weight:600;margin:3px 5px 3px 0}

  .crest{width:74px;height:74px;border:2px solid var(--gold);border-radius:50%;display:flex;align-items:center;
    justify-content:center;margin-bottom:24px}
  .crest svg{width:38px;height:38px;fill:var(--gold)}
  .cover .sub{font-size:14px;color:var(--muted);margin-top:8px;letter-spacing:.4px}
  .cover .conf{margin-top:20px;font-size:12.5px;color:#7e87ad;font-style:italic}
  .swipehint{margin-top:26px;font-size:12.5px;color:var(--muted)}

  /* nav */
  .navbar{position:absolute;left:0;right:0;bottom:0;padding:14px 18px calc(env(safe-area-inset-bottom) + 14px);
    display:flex;align-items:center;gap:14px;background:linear-gradient(to top,var(--ink2) 60%,transparent);z-index:5}
  .navbtn{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12);
    width:46px;height:46px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .navbtn:active{background:rgba(212,175,55,.25)}
  .navbtn[disabled]{opacity:.3}
  .dots{flex:1;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22)}
  .dot.on{background:var(--gold);transform:scale(1.3)}
  .count{position:absolute;top:calc(env(safe-area-inset-top) + 14px);right:18px;font-size:12.5px;color:var(--muted);z-index:5}
  .kbd{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:18px;font-size:12px;color:var(--muted);z-index:5}
</style>
</head>
<body>
<div id="deck">
  <div class="count" id="count"></div>
  <div class="kbd serif">Quorum Record</div>
  <div class="slides" id="slides"></div>
  <div class="navbar">
    <button class="navbtn" id="prev" aria-label="Previous">‹</button>
    <div class="dots" id="dots"></div>
    <button class="navbtn" id="next" aria-label="Next">›</button>
  </div>
</div>

<script>
const STAR='<svg viewBox="0 0 24 24"><path d="M12 2l2.4 5.2L20 8l-4 4 1 6-5-2.8L7 18l1-6-4-4 5.6-.8L12 2z"/></svg>';
const slides=[
  {cover:true, html:
    '<div class="crest">'+STAR+'</div>'+
    '<h1 class="serif">Quorum Ordinance Record</h1>'+
    '<div class="sub">How to use it — for the Elders Quorum Presidency</div>'+
    '<div class="conf">Held in confidence. Authorized members only.</div>'+
    '<div class="swipehint">Swipe, or use the arrows below →</div>'},

  {step:"Step 1", h:"Signing in",
    pts:["Open the link and sign in with your <b>email and password</b>.",
         "First time? Tap <b>Forgot password?</b> to set your own.",
         "Only the three presidency accounts can see anything — it is enforced on the server.",
         "For your security it <b>signs out automatically after 30 minutes</b> of no use."]},

  {step:"Add to your phone", h:"Install it like an app",
    pts:["<b>iPhone:</b> open the link in Safari → tap the Share button → <b>Add to Home Screen</b>.",
         "<b>Android:</b> open in Chrome → menu (⋮) → <b>Install app / Add to Home screen</b>.",
         "It gets the gold-star icon and opens full-screen, just like a normal app.",
         "It still requires sign-in every time it has been closed for a while."]},

  {step:"Step 2", h:"Adding a brother",
    pts:["On the <b>Brethren</b> tab, tap <b>+ Add Brother</b>.",
         "Answer the questions top to bottom — new questions <b>open up based on your answers</b>.",
         "Boundaries → Activity → Next Office → Temple &amp; Recommend → Quarter Plan.",
         "Set his <b>Calling</b>, mission status, and Focus 5 at the top.",
         "Tap <b>Save</b>. Everyone in the presidency sees it instantly."]},

  {step:"The home screen", h:"The Dashboard",
    pts:["A live count of where the quorum stands, in four groups.",
         "<b>Tap any card</b> to jump straight to that list of brethren.",
         "Cards in red are things needing attention; blue are opportunities.",
         "An <b>Open the Focus 5 Tracker</b> link sits at the bottom."]},

  {step:"The list", h:"The Brethren tab",
    pts:["Each row shows the <b>live stage</b> of every item, colour-coded.",
         "Records move Not started → Address located → Transfer requested → Transferred.",
         "The <b>⚑ Action</b> column shows how many follow-ups a brother has.",
         "<b>Search</b> by name or <b>filter</b> the list at the top.",
         "<b>Tap any row to edit</b> — anytime, from anywhere."]},

  {step:"The plan", h:"Meeting Review",
    pts:["Built for your presidency meeting and ward council.",
         "Headline numbers, charts, and <b>This Quarter</b> progress.",
         "Priority groups: advancement, temple, records out of ward.",
         "A plain-language write-up of every brother, follow-ups first.",
         "Tap <b>Print / Save as PDF</b> for a council copy."]},

  {step:"Action plan", h:"Opportunities",
    pts:["Auto-built plan of action, split into Temple and Missionary work.",
         "Temple: baptism/recommend expired, endowment path, prospective elders for temple class, sealings.",
         "Missionary: full-time missionaries, ward mission leader &amp; missionaries, reactivation, the Focus 5.",
         "Each item carries a suggested <b>next action</b>."]},

  {step:"Over time", h:"History &amp; Trends",
    pts:["A permanent log of every completed ordinance.",
         "Mark a Quarter Plan goal <b>Completed</b> and it records here automatically.",
         "Or log one by hand with the form at the top.",
         "See <b>quarter-over-quarter</b> charts of how you are doing."]},

  {step:"90-day focus", h:"The Quarter Plan",
    pts:["Inside each brother (section 4): set one <b>goal</b>, a <b>target quarter</b>, and a <b>status</b>.",
         "Mark it Completed and add the date — it feeds the History trends.",
         "The Meeting Review shows goals set, in progress, completed, and overdue."]},

  {step:"Keeping it safe", h:"Backups &amp; members",
    pts:["<b>Settings</b> → Export a backup any time.",
         "New presidency member? Add their account in Firebase, add their email to the rules.",
         "Everything is private to the three of you and never stored in the web page itself.",
         "This holds sacred information — keep the link and access within the presidency."]},

  {cover:true, html:
    '<div class="crest">'+STAR+'</div>'+
    '<h2 class="serif">That\u2019s it.</h2>'+
    '<p>Add your brethren, keep their stages current, and let the Review and Opportunities tabs turn it into a plan.</p>'+
    '<p style="margin-top:14px;color:#9aa3c4">For questions, talk with the quorum president.</p>'}
];

const slidesEl=document.getElementById('slides');
const dotsEl=document.getElementById('dots');
slides.forEach(function(s,i){
  const d=document.createElement('div'); d.className='slide'+(s.cover?' cover':'');
  if(s.html){ d.innerHTML=s.html; }
  else{
    let h='';
    if(s.step) h+='<div class="step">'+s.step+'</div>';
    if(s.h) h+='<h2 class="serif">'+s.h+'</h2>';
    if(s.pts) h+='<ul class="pts">'+s.pts.map(function(p){return '<li>'+p+'</li>';}).join('')+'</ul>';
    d.innerHTML=h;
  }
  slidesEl.appendChild(d);
  const dot=document.createElement('div'); dot.className='dot'; dotsEl.appendChild(dot);
});

let cur=0; const N=slides.length;
const slideNodes=slidesEl.querySelectorAll('.slide');
const dotNodes=dotsEl.querySelectorAll('.dot');
const prevBtn=document.getElementById('prev'), nextBtn=document.getElementById('next'), countEl=document.getElementById('count');
function render(){
  slideNodes.forEach(function(n,i){ n.classList.toggle('active',i===cur); n.classList.toggle('prev',i<cur); });
  dotNodes.forEach(function(n,i){ n.classList.toggle('on',i===cur); });
  prevBtn.disabled=cur===0; nextBtn.disabled=cur===N-1;
  countEl.textContent=(cur+1)+' / '+N;
}
function go(d){ const n=cur+d; if(n>=0&&n<N){ cur=n; render(); } }
prevBtn.addEventListener('click',function(){go(-1);});
nextBtn.addEventListener('click',function(){go(1);});
document.addEventListener('keydown',function(e){ if(e.key==='ArrowRight'||e.key===' ') go(1); if(e.key==='ArrowLeft') go(-1); });
let sx=0, sy=0;
slidesEl.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
slidesEl.addEventListener('touchend',function(e){
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ go(dx<0?1:-1); }
},{passive:true});
render();
</script>
</body>
</html>
